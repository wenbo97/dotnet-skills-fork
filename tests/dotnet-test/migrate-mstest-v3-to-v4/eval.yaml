scenarios:
  # ============================================================================
  # Goal 1: Custom TestMethodAttribute migration
  # ============================================================================

  - name: "Migrate custom TestMethodAttribute from Execute to ExecuteAsync"
    prompt: |
      I upgraded my test project to MSTest v4 and now it won't compile. I have a custom
      RetryTestMethodAttribute that overrides Execute, and I get an error that Execute is
      not virtual or doesn't exist. Help me fix this MSTest v4 breaking change -- how do I
      migrate my custom TestMethodAttribute from Execute to ExecuteAsync?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-custom-testmethod/TestProject.csproj"
        - path: "PaymentServiceTests.cs"
          source: "fixtures/v3-custom-testmethod/PaymentServiceTests.cs"
    assertions:
      - type: "output_matches"
        pattern: "ExecuteAsync"
      - type: "output_matches"
        pattern: "Task<TestResult\\[\\]>|Task<.*TestResult.*>"
    rubric:
      - "Identifies the Execute → ExecuteAsync breaking change in MSTest v4"
      - "Shows how to change the method signature to return Task<TestResult[]>"
      - "Recommends using Task.FromResult for synchronous logic or making the method properly async"
      - "Mentions that this change fixes deadlock bugs from the v3 synchronous API"
    timeout: 180

  # ============================================================================
  # Goal 2: ExpectedExceptionAttribute removal
  # ============================================================================

  - name: "Replace ExpectedExceptionAttribute with Assert.ThrowsExactly"
    prompt: |
      I upgraded my test project to MSTest v4 and several test methods that use
      [ExpectedException] no longer compile. Help me fix this MSTest v4 breaking change:
      what's the replacement after the ExpectedExceptionAttribute removal?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-expected-exception/TestProject.csproj"
        - path: "ValidationServiceTests.cs"
          source: "fixtures/v3-expected-exception/ValidationServiceTests.cs"
    assertions:
      - type: "output_matches"
        pattern: "(ThrowsExactly|Assert\\.Throws)"
      - type: "output_matches"
        pattern: "(ExpectedException|removed|deprecated)"
    rubric:
      - "Identifies that ExpectedExceptionAttribute was removed in MSTest v4"
      - "Recommends replacing with Assert.ThrowsExactly<T>(() => ...) inside the test body"
      - "Shows concrete code examples of the before/after transformation"
      - "Mentions that the MSTEST0006 analyzer in MSTest 3.2+ could have caught this earlier"
    timeout: 180

  # ============================================================================
  # Goal 3: Multiple source breaking changes in one project
  # ============================================================================

  - name: "Fix multiple v4 breaking changes: Assert, ClassCleanup, TestContext, Timeout"
    prompt: |
      I upgraded my test project to MSTest v4 (from 3.8 to 4.0) and now it won't compile.
      The errors mention ThrowsException, ClassCleanupBehavior, and TestTimeout. Help me
      fix these MSTest v4 breaking changes -- can you review my code and fix them?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-assert-changes/TestProject.csproj"
        - path: "CalculatorTests.cs"
          source: "fixtures/v3-assert-changes/CalculatorTests.cs"
      commands:
        - "dotnet restore"
    assertions:
      - type: "output_matches"
        pattern: "(ThrowsExactly|ThrowsException)"
      - type: "output_matches"
        pattern: "(ClassCleanup|ClassCleanupBehavior)"
      - type: "output_matches"
        pattern: "(TestTimeout|int\\.MaxValue|Infinite)"
    rubric:
      - "Identifies Assert.ThrowsException removal and recommends Assert.ThrowsExactly"
      - "Identifies the Assert.AreEqual message+params change — recommends string interpolation"
      - "Identifies Assert.IsInstanceOfType<T> out parameter change — shows return value pattern"
      - "Identifies ClassCleanupBehavior.EndOfClass removal — recommends just [ClassCleanup]"
      - "Identifies TestContext.Properties.Contains → ContainsKey change"
      - "Identifies TestTimeout.Infinite removal — recommends int.MaxValue"
    timeout: 300

  # ============================================================================
  # Goal 4: Dropped target framework
  # ============================================================================

  - name: "Handle net6.0 target framework dropped in MSTest v4"
    prompt: |
      My test project targets net6.0 and uses MSTest 3.8.0. I want to migrate to MSTest v4.
      Will my target framework still be supported, or do I need to change it?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-dropped-tfm/TestProject.csproj"
        - path: "SimpleTests.cs"
          source: "fixtures/v3-dropped-tfm/SimpleTests.cs"
    assertions:
      - type: "output_matches"
        pattern: "(net6\\.0|dropped|unsupported|net8\\.0)"
    rubric:
      - "Identifies that MSTest v4 dropped support for .NET 6.0 (and .NET 7.0, .NET Core 3.1 through .NET 5)"
      - "Recommends upgrading to net8.0 as the minimum supported .NET version"
      - "Mentions that .NET Framework 4.6.2+ continues to be supported"
      - "Does not suggest staying on net6.0 with MSTest v4"
    timeout: 180

  # ============================================================================
  # Goal 5: TestMethodAttribute CallerInfo changes
  # ============================================================================

  - name: "Fix TestMethodAttribute CallerInfo constructor breaking change"
    prompt: |
      I have a custom attribute that inherits from TestMethodAttribute with a constructor
      that takes a string parameter for display name. After upgrading to MSTest v4, the
      base constructor signature changed. How do I fix this?
    setup:
      files:
        - path: "TestProject.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="MSTest" Version="3.8.0" />
              </ItemGroup>
            </Project>
        - path: "CustomAttributes.cs"
          content: |
            using Microsoft.VisualStudio.TestTools.UnitTesting;

            namespace MyApp.Tests;

            public class CategorizedTestMethodAttribute : TestMethodAttribute
            {
                public string Category { get; }

                public CategorizedTestMethodAttribute(string category)
                {
                    Category = category;
                }
            }

            [TestClass]
            public class ServiceTests
            {
                [CategorizedTestMethod("Integration")]
                public void ConnectToDatabase_Succeeds()
                {
                    Assert.IsTrue(true);
                }

                [TestMethod("My custom display name")]
                public void SimpleTest()
                {
                    Assert.IsTrue(true);
                }
            }
      commands:
        - "dotnet restore"
    assertions:
      - type: "output_matches"
        pattern: "(CallerFilePath|CallerLineNumber|caller.?info)"
      - type: "output_matches"
        pattern: "(DisplayName|display.?name)"
    rubric:
      - "Explains that TestMethodAttribute now uses CallerFilePath and CallerLineNumber in its constructor"
      - "Shows how to propagate caller info parameters to the base class constructor"
      - "Identifies that [TestMethod(\"display name\")] must change to [TestMethod(DisplayName = \"display name\")]"
      - "Provides concrete fixed code for the custom attribute"
    timeout: 240

  # ============================================================================
  # Goal 6: Behavioral changes awareness
  # ============================================================================

  - name: "Understand behavioral changes after MSTest v4 upgrade"
    prompt: |
      I upgraded my MSTest project to v4 and everything compiles, but some tests are
      behaving differently. In Azure DevOps, all of my tests appear as brand new tests
      with no history. Also, one test that accesses TestContext.TestName inside a
      [ClassInitialize] method now throws an exception at runtime. Are these known v4
      changes? What else should I watch out for?
    setup:
      files:
        - path: "TestProject.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="MSTest" Version="4.1.0" />
              </ItemGroup>
            </Project>
        - path: "SetupTests.cs"
          content: |
            using Microsoft.VisualStudio.TestTools.UnitTesting;

            namespace MyApp.Tests;

            [TestClass]
            public class SetupTests
            {
                public TestContext TestContext { get; set; }

                [ClassInitialize]
                public static void ClassInit(TestContext context)
                {
                    var testName = context.TestName;
                    // Log setup for specific test
                }

                [TestMethod]
                public void RunTest()
                {
                    Assert.IsTrue(true);
                }
            }
    assertions:
      - type: "output_matches"
        pattern: "(TestCase\\.Id|test.?id|history|Azure DevOps)"
      - type: "output_matches"
        pattern: "(TestName|ClassInitialize|cannot.?be.?accessed|throws)"
    rubric:
      - "Explains that TestCase.Id generation changed in v4, causing Azure DevOps to treat tests as new"
      - "Explains that TestContext.TestName cannot be accessed in ClassInitialize — this is a v4 behavioral change"
      - "Suggests moving TestName access to TestInitialize or individual test methods"
      - "Mentions TreatDiscoveryWarningsAsErrors now defaults to true as another potential behavioral change"
    timeout: 180

  # ============================================================================
  # Goal 7: MSTest.Sdk and Microsoft.Testing.Platform changes
  # ============================================================================

  - name: "Handle MSTest.Sdk and MTP changes in v4"
    prompt: |
      I upgraded my test project to MSTest v4 -- it uses MSTest.Sdk/4.1.0 (previously
      MSTest.Sdk/3.8.0) with Microsoft.Testing.Platform. Now my CI pipeline that runs
      vstest.console no longer discovers any tests. Help me fix this MSTest v4 breaking
      change: what changed in MSTest.Sdk v4 and how do I restore test discovery?
    setup:
      files:
        - path: "TestProject.csproj"
          content: |
            <Project Sdk="MSTest.Sdk/4.1.0">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
              </PropertyGroup>
            </Project>
        - path: "PipelineTests.cs"
          content: |
            using Microsoft.VisualStudio.TestTools.UnitTesting;

            namespace MyApp.Tests;

            [TestClass]
            public class PipelineTests
            {
                [TestMethod]
                public void BuildStep_Succeeds() { Assert.IsTrue(true); }

                [TestMethod]
                public void DeployStep_Succeeds() { Assert.IsTrue(true); }
            }
    assertions:
      - type: "output_matches"
        pattern: "(Microsoft\\.NET\\.Test\\.Sdk|VSTest|vstest)"
      - type: "output_matches"
        pattern: "(removed|no longer|package.?reference)"
    rubric:
      - "Explains that MSTest.Sdk v4 no longer adds Microsoft.NET.Test.Sdk reference when using MTP"
      - "Without Microsoft.NET.Test.Sdk, vstest.console cannot discover tests"
      - "Recommends adding an explicit PackageReference to Microsoft.NET.Test.Sdk if VSTest support is needed"
      - "Alternatively, recommends migrating the CI pipeline to use 'dotnet test' with MTP instead of vstest.console"
    timeout: 180

  # ============================================================================
  # Goal 8: Full end-to-end migration
  # ============================================================================

  - name: "Full MSTest v3 to v4 migration with multiple breaking changes"
    prompt: |
      I need to migrate our test project from MSTest 3.x to MSTest 4.x. The project has
      custom test method attributes, uses ExpectedException, uses ClassCleanupBehavior,
      and targets net6.0. Can you give me a complete migration plan?
    setup:
      files:
        - path: "TestProject.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net6.0</TargetFramework>
                <IsPackable>false</IsPackable>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="MSTest.TestFramework" Version="3.8.0" />
                <PackageReference Include="MSTest.TestAdapter" Version="3.8.0" />
                <PackageReference Include="Microsoft.NET.Test.Sdk" Version="17.13.0" />
              </ItemGroup>
            </Project>
        - path: "IntegrationTests.cs"
          content: |
            using System;
            using System.Runtime.CompilerServices;
            using Microsoft.VisualStudio.TestTools.UnitTesting;

            namespace MyApp.Tests;

            public sealed class LoggingTestMethodAttribute : TestMethodAttribute
            {
                public override TestResult[] Execute(ITestMethod testMethod)
                {
                    Console.WriteLine($"Starting: {testMethod.TestMethodName}");
                    return base.Execute(testMethod);
                }
            }

            [TestClass]
            public class IntegrationTests
            {
                public TestContext TestContext { get; set; }

                [ClassCleanup(ClassCleanupBehavior.EndOfClass)]
                public static void Cleanup(TestContext context) { }

                [ExpectedException(typeof(ArgumentException))]
                [TestMethod]
                public void Validate_BadInput_Throws()
                {
                    throw new ArgumentException("bad");
                }

                [LoggingTestMethod]
                public void RunIntegration()
                {
                    Assert.AreEqual(1, 1, "Expected {0}", 1);
                    TestContext.Properties.Contains("env");
                }

                [TestMethod]
                [Timeout(TestTimeout.Infinite)]
                public void LongRunning()
                {
                    Assert.IsTrue(true);
                }
            }
    assertions:
      - type: "output_matches"
        pattern: "(net8\\.0|target.?framework|dropped)"
      - type: "output_matches"
        pattern: "(ExecuteAsync|Execute.*Async)"
      - type: "output_matches"
        pattern: "(ExpectedException|ThrowsExactly)"
      - type: "output_matches"
        pattern: "(ClassCleanupBehavior|ClassCleanup)"
    rubric:
      - "Identifies net6.0 must be upgraded to net8.0 or later"
      - "Identifies LoggingTestMethodAttribute.Execute must become ExecuteAsync"
      - "Identifies ExpectedException must be replaced with Assert.ThrowsExactly"
      - "Identifies ClassCleanupBehavior.EndOfClass enum must be removed"
      - "Identifies Assert.AreEqual format string must use string interpolation"
      - "Identifies TestContext.Properties.Contains must become ContainsKey"
      - "Identifies TestTimeout.Infinite must become int.MaxValue"
      - "Provides a logical migration order: TFM first, then packages, then code fixes"
    timeout: 240

  # ============================================================================
  # Goal 9: MSTest.Sdk project with ManagedType and TestTimeout
  # ============================================================================

  - name: "Migrate MSTest.Sdk v3 project using ManagedType and TestTimeout"
    prompt: |
      I upgraded my test project from MSTest.Sdk/3.8.0 to MSTest.Sdk/4.1.0 and now I get
      these compilation errors:
      - CS1061: 'TestContext' does not contain a definition for 'ManagedType'
      - CS0103: The name 'TestTimeout' does not exist in the current context
      - CS1061: 'IDictionary<string, object>' does not contain a definition for 'Contains'
      How do I fix these errors? Also, is there anything else I should know about
      MSTest.Sdk v4 behavior changes?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-sdk-project/TestProject.csproj"
        - path: "DiagnosticTests.cs"
          source: "fixtures/v3-sdk-project/DiagnosticTests.cs"
      commands:
        - "dotnet restore"
    assertions:
      - type: "output_matches"
        pattern: "(ManagedType|FullyQualifiedTestClassName)"
      - type: "output_matches"
        pattern: "(TestTimeout|int\\.MaxValue|Infinite)"
      - type: "output_matches"
        pattern: "(ContainsKey|Contains)"
    rubric:
      - "Identifies that TestContext.ManagedType is removed in v4 and recommends FullyQualifiedTestClassName"
      - "Identifies that TestTimeout.Infinite is removed and recommends int.MaxValue"
      - "Identifies that TestContext.Properties.Contains must become ContainsKey"
      - "Notes the project is using MSTest.Sdk/4.1.0 or confirms the SDK version upgrade"
      - "Mentions that MSTest.Sdk v4 no longer adds Microsoft.NET.Test.Sdk when using MTP"
    timeout: 300

  # ============================================================================
  # Goal 10: Verified package update with build and test validation
  # ============================================================================

  - name: "Verified MSTest v3 to v4 package update with build and test"
    prompt: |
      I need to upgrade my test project from MSTest 3.8.0 to MSTest 4.x.
      Please update the package references, fix any breaking changes, then
      build the project and run the tests to make sure everything works.
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-verified-migration/TestProject.csproj"
        - path: "OrderServiceTests.cs"
          source: "fixtures/v3-verified-migration/OrderServiceTests.cs"
    assertions:
      - type: "file_contains"
        path: "TestProject.csproj"
        value: "PackageReference Include=\"MSTest.TestFramework\" Version=\"4."
      - type: "file_contains"
        path: "TestProject.csproj"
        value: "PackageReference Include=\"MSTest.TestAdapter\" Version=\"4."
      - type: "output_matches"
        pattern: "(dotnet build|dotnet test|build.*succeed|test.*pass)"
      - type: "output_matches"
        pattern: "(int\\.MaxValue|int\\.Max)"
    rubric:
      - "Updated MSTest package references from 3.8.0 to a 4.x version"
      - "Fixed the TestTimeout.Infinite breaking change to int.MaxValue"
      - "Built the project and confirmed zero compilation errors"
      - "Ran the tests with dotnet test and confirmed all tests pass"
    timeout: 300

  # ============================================================================
  # Goal 11: Sealed custom TestMethodAttribute with Timeout changes
  # ============================================================================

  - name: "Fix sealed custom TestMethodAttribute with Timeout changes"
    prompt: |
      After upgrading to MSTest 4.1.0, my test project fails to compile. I have a sealed
      custom TestMethodAttribute subclass that overrides Execute, and several tests use
      [Timeout(TestTimeout.Infinite)]. How do I fix these errors?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-sealed-testmethod/TestProject.csproj"
        - path: "PerformanceTests.cs"
          source: "fixtures/v3-sealed-testmethod/PerformanceTests.cs"
      commands:
        - "dotnet restore"
    assertions:
      - type: "output_matches"
        pattern: "(ExecuteAsync|Execute.*Async)"
      - type: "output_matches"
        pattern: "(Task<TestResult|Task<.*TestResult)"
      - type: "output_matches"
        pattern: "(TestTimeout|int\\.MaxValue|Infinite)"
    rubric:
      - "Identifies Execute → ExecuteAsync breaking change and shows the async signature"
      - "Shows how to propagate CallerInfo parameters to the base constructor in the sealed attribute"
      - "Identifies TestTimeout.Infinite removal and recommends int.MaxValue"
      - "Provides concrete fixed code for the sealed TimedTestMethodAttribute"
    timeout: 240

  # ============================================================================
  # Goal 12: TestMethodAttribute and TestMethod display name syntax
  # ============================================================================

  - name: "Fix TestMethodAttribute and TestMethod display name constructor"
    prompt: |
      I upgraded my test project to MSTest v4 and it no longer compiles. I use
      [TestMethod("display name")] and [TestMethodAttribute("display name")] to set custom
      display names, and those constructors now break. Help me fix this MSTest v4 breaking
      change -- the CallerInfo constructor on TestMethodAttribute. How should I update them?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-testmethod-displayname/TestProject.csproj"
        - path: "AuthTests.cs"
          source: "fixtures/v3-testmethod-displayname/AuthTests.cs"
    assertions:
      - type: "output_matches"
        pattern: "(DisplayName|display.?name)"
      - type: "output_matches"
        pattern: "(CallerFilePath|CallerLineNumber|caller.?info)"
    rubric:
      - "Identifies that TestMethodAttribute constructor now uses CallerInfo parameters"
      - "Shows the correct syntax: [TestMethod(DisplayName = \"...\")]"
      - "Applies the fix to both [TestMethod(\"...\")] and [TestMethodAttribute(\"...\")] usages"
      - "Provides corrected code for all three test methods in the fixture"
    timeout: 180

  # ============================================================================
  # Goal 13: Assert.IsInstanceOfType out parameter breaking change
  # ============================================================================

  - name: "Fix Assert.IsInstanceOfType out parameter removal"
    prompt: |
      I upgraded my test project to MSTest v4 and my tests that use Assert.IsInstanceOfType
      with an out parameter no longer compile. I get errors like:
      - CS1615: Argument 2 should not be passed with the 'out' keyword
      Help me fix this MSTest v4 breaking change -- the Assert.IsInstanceOfType out parameter removal.
      How do I update these assertions?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-instanceoftype/TestProject.csproj"
        - path: "TypeCheckTests.cs"
          source: "fixtures/v3-instanceoftype/TypeCheckTests.cs"
    assertions:
      - type: "output_matches"
        pattern: "IsInstanceOfType"
      - type: "output_matches"
        pattern: "(return value|var typed|var .* = Assert)"
    rubric:
      - "Identifies that Assert.IsInstanceOfType<T> no longer uses an out parameter in MSTest v4"
      - "Shows the new pattern: var typed = Assert.IsInstanceOfType<T>(obj) using the return value"
      - "Provides corrected code for all three test methods using IsInstanceOfType"
      - "Explains the typed variable is now assigned from the return value instead of an out parameter"
    timeout: 240

  # ============================================================================
  # Goal 14: Behavioral changes review and remediation
  # ============================================================================

  - name: "Address TreatDiscoveryWarningsAsErrors and behavioral changes"
    prompt: |
      I upgraded my MSTest project to v4 and the code compiles fine. But when I run
      dotnet test, some tests that used to be discovered are now failing with discovery
      errors. I also noticed that my [ClassInitialize] method crashes when it tries to
      access TestContext.TestName. The project compiled cleanly — are these runtime
      behavioral changes in v4? How do I fix them?
    setup:
      files:
        - path: "TestProject.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="MSTest" Version="4.1.0" />
              </ItemGroup>
            </Project>
        - path: "DiscoveryTests.cs"
          content: |
            using Microsoft.VisualStudio.TestTools.UnitTesting;

            namespace MyApp.Tests;

            [TestClass]
            public class DiscoveryTests
            {
                public TestContext TestContext { get; set; }

                [ClassInitialize]
                public static void ClassSetup(TestContext context)
                {
                    var name = context.TestName;
                    System.Console.WriteLine($"Setting up for: {name}");
                }

                [TestMethod]
                public void DiscoverMe() => Assert.IsTrue(true);
            }
    assertions:
      - type: "output_matches"
        pattern: "(TreatDiscoveryWarningsAsErrors|discovery.*(warning|error))"
      - type: "output_matches"
        pattern: "(TestName|ClassInitialize|TestInitialize)"
    rubric:
      - "Identifies that TreatDiscoveryWarningsAsErrors defaults to true in MSTest v4, causing previously-ignored warnings to fail"
      - "Recommends fixing discovery warnings or setting TreatDiscoveryWarningsAsErrors to false in .runsettings"
      - "Identifies that accessing TestContext.TestName in ClassInitialize throws in v4"
      - "Recommends moving TestName access to TestInitialize or individual test methods"
      - "Mentions other behavioral changes the user should watch for (AppDomain, TestCase.Id, analyzer severity changes)"
    timeout: 180

  # ============================================================================
  # Goal 15: Recognize v3 project needs v3→v4 migration, not v1→v3
  # ============================================================================

  - name: "Correctly identify MSTest v3 project and recommend v4 migration"
    prompt: |
      My test project uses MSTest 3.8.0 on net8.0. I want to upgrade to the latest
      version. What breaking changes should I expect and how do I fix them?
    setup:
      files:
        - path: "TestProject.csproj"
          source: "fixtures/v3-expected-exception/TestProject.csproj"
        - path: "ValidationServiceTests.cs"
          source: "fixtures/v3-expected-exception/ValidationServiceTests.cs"
    assertions:
      - type: "output_matches"
        pattern: "(v4|4\\.[0-9]+|MSTest 4)"
      - type: "output_matches"
        pattern: "(ExpectedException|ThrowsExactly)"
    rubric:
      - "Correctly identifies the project as MSTest v3 (3.8.0) and recommends MSTest v4"
      - "Identifies that [ExpectedException] is removed in v4 and shows how to replace with Assert.ThrowsExactly"
      - "Provides concrete before/after code examples for the ExpectedException migration"
      - "Mentions other key v4 breaking changes beyond just ExpectedException (e.g., Assert API changes, TestCase.Id changes)"
      - "Does not suggest v1→v3 migration steps since the project is already on v3"
    timeout: 180
